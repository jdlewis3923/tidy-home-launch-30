<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#2880d8"/>
      <stop offset="100%" stop-color="#0e4a96"/>
    </radialGradient>
    <clipPath id="innerClip">
      <circle cx="256" cy="256" r="220"/>
    </clipPath>
  </defs>

  <!-- Outer yellow ring -->
  <circle cx="256" cy="256" r="250" fill="#f5c518"/>

  <!-- Inner blue circle -->
  <circle cx="256" cy="256" r="220" fill="url(#bg)"/>

  <!-- Sunburst rays (behind T, clipped to inner circle) -->
  <g clip-path="url(#innerClip)" stroke="#ffffff" stroke-width="1" opacity="0.12">
    <line x1="256" y1="256" x2="256" y2="36"/>
    <line x1="256" y1="256" x2="411.5" y2="100.5"/>
    <line x1="256" y1="256" x2="476" y2="256"/>
    <line x1="256" y1="256" x2="411.5" y2="411.5"/>
    <line x1="256" y1="256" x2="256" y2="476"/>
    <line x1="256" y1="256" x2="100.5" y2="411.5"/>
    <line x1="256" y1="256" x2="36" y2="256"/>
    <line x1="256" y1="256" x2="100.5" y2="100.5"/>
  </g>

  <!-- T shadow -->
  <path d="M 116,122 L 396,122 L 396,194 L 292,194 L 292,410 L 220,410 L 220,194 L 116,194 Z"
        fill="#0a3778" opacity="0.6" transform="translate(2,2)"/>

  <!-- T lettermark (custom path, bold condensed) -->
  <path d="M 116,120 L 396,120 L 396,192 L 292,192 L 292,408 L 220,408 L 220,192 L 116,192 Z"
        fill="#ffffff"/>

  <!-- Sparkle accent (4-point star at top-right on yellow ring) -->
  <g transform="translate(410, 90)">
    <path d="M 0,-28 L 6,-6 L 28,0 L 6,6 L 0,28 L -6,6 L -28,0 L -6,-6 Z"
          fill="#ffffff" opacity="0.95"/>
  </g>
</svg>
