# Stripe sends webhooks without an Authorization header — JWT verification
# would 401 every event. We verify the request authenticity via Stripe's
# HMAC signature (constructEventAsync) inside the handler.
[functions.stripe-webhook]
verify_jwt = false

# Jobber redirects the operator's browser here after OAuth consent — no
# Authorization header is sent. Safe because the ?code is single-use and
# tied to our redirect_uri.
[functions.jobber-oauth-callback]
verify_jwt = false

# Jobber posts webhooks without an Authorization header. We verify
# authenticity via the X-Jobber-Hmac-SHA256 header inside the handler
# using JOBBER_WEBHOOK_SECRET.
[functions.jobber-webhook]
verify_jwt = false

# Meta redirects the operator's browser here after OAuth consent — no
# Authorization header is sent. Same single-use ?code pattern as Jobber,
# plus we validate the `state` param to prevent CSRF.
[functions.meta-oauth-callback]
verify_jwt = false

# Public read-only endpoint that returns the captured Meta Pixel ID so
# the client-side Pixel snippet can self-configure. Returns no secrets.
[functions.meta-pixel-id]
verify_jwt = false

# Public chatbot endpoint — anonymous homepage visitors must be able to chat.
# Reads only the public chatbot_knowledge row; no secrets returned.
[functions.chat-assistant]
verify_jwt = false

# Twilio inbound SMS webhook — Twilio does not send Authorization header.
# Authenticity verified inside the handler via X-Twilio-Signature HMAC.
[functions.twilio-inbound-sms]
verify_jwt = false

# Public web-chat ingest — anonymous visitors call this from the chatbot widget.
[functions.chat-message]
verify_jwt = false

# Called by pg_cron (no JWT) and by admin "Post now" button. Auth-checked
# in-handler by virtue of needing a valid post_id that exists in the
# admin-only social_posts table; never accepts caption/image from caller.
[functions.meta-publish-post]
verify_jwt = false

# Public application form — anonymous visitors submit /apply.
[functions.submit-application]
verify_jwt = false

# (No external background-check provider wired yet — manual review only.)

# Called fire-and-forget by submit-application; no Authorization header needed.
[functions.applicant-applied-trigger]
verify_jwt = false

# Admin-only pipeline mover. We perform admin-role validation in-handler;
# service-role calls bypass for E2E + internal triggers. JWT verification is
# disabled at the gateway so service-role bearer tokens are accepted.
[functions.advance-applicant]
verify_jwt = false

# Admin-only test-suite trigger; admin-role check happens in-handler.
[functions.fire-email-test-suite]
verify_jwt = false

