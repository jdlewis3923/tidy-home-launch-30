# Stripe sends webhooks without an Authorization header — JWT verification
# would 401 every event. We verify the request authenticity via Stripe's
# HMAC signature (constructEventAsync) inside the handler.
[functions.stripe-webhook]
verify_jwt = false

# Jobber redirects the operator's browser here after OAuth consent — no
# Authorization header is sent. Safe because the ?code is single-use and
# tied to our redirect_uri.
[functions.jobber-oauth-callback]
verify_jwt = false

# Jobber posts webhooks without an Authorization header. We verify
# authenticity via the X-Jobber-Hmac-SHA256 header inside the handler
# using JOBBER_WEBHOOK_SECRET.
[functions.jobber-webhook]
verify_jwt = false

# Meta redirects the operator's browser here after OAuth consent — no
# Authorization header is sent. Same single-use ?code pattern as Jobber,
# plus we validate the `state` param to prevent CSRF.
[functions.meta-oauth-callback]
verify_jwt = false

# Public read-only endpoint that returns the captured Meta Pixel ID so
# the client-side Pixel snippet can self-configure. Returns no secrets.
[functions.meta-pixel-id]
verify_jwt = false

# Public chatbot endpoint — anonymous homepage visitors must be able to chat.
# Reads only the public chatbot_knowledge row; no secrets returned.
[functions.chat-assistant]
verify_jwt = false
